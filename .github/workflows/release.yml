name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Create release archive
        run: |
          STAGING="$(mktemp -d)"
          mkdir -p "${STAGING}/intema"

          cp -r bin "${STAGING}/intema/"
          cp -r bootstrap "${STAGING}/intema/"
          cp -r scripts "${STAGING}/intema/"
          cp bootstrap.sh "${STAGING}/intema/"
          cp install.sh "${STAGING}/intema/"
          cp LICENSE "${STAGING}/intema/"
          cp README.md "${STAGING}/intema/"

          tar -czf /tmp/intema.tar.gz -C "${STAGING}" intema
          mv /tmp/intema.tar.gz intema.tar.gz
          rm -rf "${STAGING}"

      - name: Generate SHA256 checksum
        run: |
          sha256sum intema.tar.gz > intema.tar.gz.sha256
          cat intema.tar.gz.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            intema.tar.gz
            intema.tar.gz.sha256
          generate_release_notes: true
