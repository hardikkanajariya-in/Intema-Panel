name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath, intl, gd

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: pnpm

      - name: Install PHP dependencies
        run: composer install --no-dev --prefer-dist --no-interaction --optimize-autoloader

      - name: Build frontend
        run: |
          pnpm install --frozen-lockfile
          pnpm run build

      - name: Optimize Laravel
        run: |
          cp .env.example .env
          php artisan key:generate --force
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache
          rm -f .env

      - name: Create release archive
        run: |
          tar -czf intema-panel.tar.gz \
            --exclude=node_modules \
            --exclude=.git \
            --exclude=tests \
            --exclude=.editorconfig \
            --exclude=.github \
            --exclude=.vscode \
            --exclude=storage/logs \
            --exclude=.env \
            --exclude='storage/framework/cache/data/*' \
            --exclude='storage/framework/sessions/*' \
            --exclude='storage/framework/views/*' \
            .

      - name: Generate SHA256 checksum
        run: |
          sha256sum intema-panel.tar.gz > intema-panel.tar.gz.sha256
          cat intema-panel.tar.gz.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            intema-panel.tar.gz
            intema-panel.tar.gz.sha256
          generate_release_notes: true
